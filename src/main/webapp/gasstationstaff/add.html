<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增员工</title>
    <style>
        body {
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
        }

        .form-container {
            background: #FFFFFF;
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
        }

        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            color: #1E293B;
            transition: all 0.15s ease;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group select[disabled] {
            background: #F8FAFC;
            color: #64748B;
            cursor: not-allowed;
        }

        ::placeholder {
            color: #94A3B8;
        }
    </style>
</head>

<body>
<div class="form-container">
    <form action="/GasStationStaff/save" method="post" id="myForm">
        <div class="form-group">
            <label>员工编号</label>
            <input type="text" name="GasStationStaff.staff_id" value="" placeholder="请输入员工编号" />
        </div>

        <div class="form-group">
            <label>员工名称</label>
            <input type="text" name="GasStationStaff.staff_name" value="" placeholder="请输入员工名称" />
        </div>

        <div class="form-group">
            <label>手机号码</label>
            <input type="text" name="GasStationStaff.telephone" value="" placeholder="请输入手机号码" />
        </div>

        <div class="form-group">
            <label>密码</label>
            <input type="text" name="GasStationStaff.password" value="" placeholder="请输入密码" />
        </div>

        <div class="form-group">
            <label>归属气站</label>
            <select name="GasStationStaff.station_id" id="stationSelect" disabled>
                <option selected label="请选择加气站"></option>
                #for ( x: gasStations)
                <option value="#(x.station_id)">#(x.station_name)</option>
                #end
            </select>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var stationSelect = document.getElementById('stationSelect');
        var options = stationSelect.options;

        if (options.length === 2) {
            options[1].selected = true;
        }
    });
</script>
</body>

</html>
