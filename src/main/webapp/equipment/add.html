<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增设备</title>
    <style>
        body {
            margin: 0;
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        .form_box {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 20px;
        }

        .form_box form {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form_box label {
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin: 0;
        }

        .form_box input[type="text"],
        .form_box input[type="date"],
        .form_box select,
        .form_box textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            color: #1E293B;
            font-size: 14px;
            transition: all 0.15s ease;
            box-sizing: border-box;
            font-family: inherit;
        }

        .form_box textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form_box input:focus,
        .form_box select:focus,
        .form_box textarea:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form_box input[readonly] {
            background: #F8FAFC;
            color: #64748B;
        }

        .image-upload {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .image-upload > label {
            margin: 0;
            cursor: pointer;
        }

        .image-upload img {
            width: 92px;
            height: 92px;
            border-radius: 8px;
            border: 1px solid #CBD5E1;
            object-fit: cover;
            background: #F8FAFC;
        }

        @media (max-width: 768px) {
            .form_box {
                padding: 14px;
            }

            .form_box form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="form_box">
    <form id="myForm" action="/equipment/save" method="post">
        <div class="form-group full-width">
            <label>设备站点</label>
            <input type="text" value="#(gasstation.station_name)" readonly>
        </div>

        <div class="form-group">
            <label>设备种类</label>
            <select name="equipment.kind">
                <option value="特种设备">特种设备</option>
                <option value="易损件">易损件</option>
                <option value="消防器材">消防器材</option>
            </select>
        </div>

        <input type="hidden" name="equipment.companyid" id="companyidInput" value="#(companyId)">
        <input type="hidden" name="equipment.writer" id="writerInput" value="#(writer)">

        <div class="form-group">
            <label>生产厂商</label>
            <input type="text" name="equipment.factory" value="">
        </div>
        <div class="form-group">
            <label>型号规格</label>
            <input type="text" name="equipment.model" value="">
        </div>
        <div class="form-group">
            <label>设备名称</label>
            <input type="text" name="equipment.name" value="">
        </div>
        <div class="form-group">
            <label>放置位置</label>
            <input type="text" name="equipment.location" value="">
        </div>
        <div class="form-group">
            <label>购买人员</label>
            <input type="text" name="equipment.buyer" value="">
        </div>
        <div class="form-group">
            <label>购买价格</label>
            <input type="text" name="equipment.price" value="">
        </div>
        <div class="form-group">
            <label>购买日期</label>
            <input type="date" name="equipment.buyday">
        </div>
        <div class="form-group">
            <label>生产日期</label>
            <input type="date" name="equipment.producedate">
        </div>
        <div class="form-group">
            <label>上次检修期</label>
            <input type="date" name="equipment.lastcheckdate">
        </div>
        <div class="form-group">
            <label>失效日期</label>
            <input type="date" name="equipment.expiredate">
        </div>
        <div class="form-group full-width">
            <label>备注信息</label>
            <textarea name="equipment.remark"></textarea>
        </div>

        <div class="form-group full-width">
            <label>设备图片</label>
            <div id="equipmentImageInputContainer" class="image-upload">
                <label for="equipmentImageInput">
                    <img id="equipmentImageInputPreview" src="/img/img_2.png" alt="点击添加图片" title="点击添加图片">
                </label>
                <input type="file" id="equipmentImageInput" name="equipment_picture_file" onchange="uploadFile('equipmentImageInput')" accept="image/jpeg, image/png" style="display: none;">
            </div>
            <input type="hidden" id="equipmentImageInputUrl" name="equipment.picture" value="">
        </div>
    </form>
</div>

<script>
    function uploadFile(inputElementId) {
        var fileInput = document.getElementById(inputElementId);
        var file = fileInput.files[0];
        if (!file) {
            return;
        }

        var formData = new FormData();
        formData.append("file", file);

        fetch("/equipment/equipmentImageUpload", {
            method: "POST",
            body: formData
        })
            .then(function (response) { return response.json(); })
            .then(function (data) {
                var urlInput = document.getElementById(inputElementId + "Url");
                if (urlInput.value) {
                    urlInput.value += "," + data.url;
                } else {
                    urlInput.value = data.url;
                }

                var container = document.getElementById(inputElementId + "Container");
                var div = document.createElement("div");
                div.style.position = "relative";
                div.style.width = "92px";
                div.style.height = "92px";

                var img = document.createElement("img");
                img.src = data.url;
                img.style.width = "100%";
                img.style.height = "100%";
                img.style.objectFit = "cover";
                img.style.borderRadius = "8px";
                img.style.border = "1px solid #CBD5E1";
                div.appendChild(img);

                var button = document.createElement("button");
                button.type = "button";
                button.innerText = "x";
                button.style.position = "absolute";
                button.style.top = "0";
                button.style.right = "0";
                button.style.border = "none";
                button.style.background = "rgba(255,255,255,0.8)";
                button.style.cursor = "pointer";
                button.onclick = function () {
                    div.parentNode.removeChild(div);
                    var urls = urlInput.value.split(",");
                    var urlIndex = urls.indexOf(data.url);
                    if (urlIndex > -1) {
                        urls.splice(urlIndex, 1);
                    }
                    urlInput.value = urls.join(",");
                };
                div.appendChild(button);
                container.appendChild(div);
            })
            .catch(function (error) {
                console.error("Error:", error);
            });
    }
</script>
</body>
</html>
