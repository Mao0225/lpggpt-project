<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Repair</title>
    <style>
        /* 浅色商务风格 - 表单 */
        body {
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        .form_box {
            background: #FFFFFF;
            padding: 24px;
            border-radius: 8px;
        }

        .form_box form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form_box div {
            display: flex;
            flex-direction: column;
        }

        .form_box label {
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
        }

        .form_box input[type="text"],
        .form_box select {
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            color: #1E293B;
            transition: all 0.15s ease;
        }

        .form_box input[type="text"]:focus,
        .form_box select:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>

<body>
<div class="form_box">
    <form id="myForm" action="/managegun/update" method="post">
        <input type="hidden" name="gun.id" value="#(record.id)" />
        <div>
            <label>加气枪抢号</label>
            <input type="text" name="gun.gunno"  value="#(record.gunno)"/>
        </div>
        <div>
            <label>打开枪接口</label>
            <input type="text" name="gun.caozuo"  value="#(record.caozuo)"/>
        </div>
        <div>
            <label>关闭枪接口</label>
            <input type="text" name="gun.yuliu1"  value="#(record.yuliu1)"/>
        </div>
        <div>
            <label>公司名称</label>
            <select id="selectName" name="gun.stationid" value=#(stationRecord.get("station_name")) onchange="chooseName()">
                #for (x: gastations)
                <option value="#(x.id)">#(x.station_name)</option>
                #end
            </select>
        </div>
    </form>
</div>
</body>
<script>
    var gastations = [
        #for (x: gastations)
    { id: "#(x.id)", name: "#(x.station_name)" },
    #end
    ];
    function chooseName() {
        var selectName = document.getElementById("selectName").value;
        console.log("selectName: " + selectName);
        // 查找选中的备件对象，通过name属性来查找
        var selectedCompany = gastations.find(function (gastations) {
            return gastations.name === selectName;
        });
    }
</script>
</html>
