<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能授权</title>
    <link rel="stylesheet" type="text/css" href="../css/index.css">

    <style>
        body {
            margin: 0;
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        .page-container {
            min-height: 100vh;
            padding: 20px;
            background: #F8FAFC;
        }

        #pagediv {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .header-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .page-title {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: #1E293B;
        }

        .page-desc {
            margin: 0;
            font-size: 13px;
            color: #64748B;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #CBD5E1;
            background: #FFFFFF;
            color: #475569;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s ease;
        }

        .btn-back:hover {
            background: #F8FAFC;
            border-color: #94A3B8;
            color: #334155;
            text-decoration: none;
        }

        .table-wrapper {
            overflow-x: auto;
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
        }

        table.list {
            width: 100%;
            min-width: 760px;
            border-collapse: collapse;
            background: #FFFFFF;
        }

        table.list th {
            background: #F8FAFC;
            color: #475569;
            font-size: 13px;
            font-weight: 600;
            text-align: left;
            padding: 14px 16px;
            border-bottom: 1px solid #E2E8F0;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        table.list td {
            padding: 14px 16px;
            font-size: 14px;
            color: #1E293B;
            border-bottom: 1px solid #F1F5F9;
            vertical-align: middle;
            white-space: nowrap;
        }

        table.list tbody tr {
            background: #FFFFFF;
            transition: background 0.15s ease;
        }

        table.list tbody tr:nth-child(even) {
            background: #F8FAFC;
        }

        table.list tbody tr:hover {
            background: #F1F5F9;
        }

        table.list tbody tr:last-child td {
            border-bottom: none;
        }

        .auth-cell {
            text-align: center;
        }

        .auth-checkbox {
            width: 16px;
            height: 16px;
            accent-color: #3B82F6;
            cursor: pointer;
        }

        .page-container .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            color: #475569;
            flex-wrap: wrap;
        }

        .page-container .pagination a,
        .page-container .pagination span:not(.page-info):not(.gap):not(.current) {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            padding: 0 8px;
            font-size: 14px;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            color: #475569;
            background: #FFFFFF;
            text-decoration: none;
            transition: all 0.15s ease;
        }

        .page-container .pagination a:hover {
            background: #F8FAFC;
            border-color: #CBD5E1;
        }

        .page-container .pagination .current {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            padding: 0 8px;
            background: #3B82F6;
            color: #FFFFFF;
            border: 1px solid #3B82F6;
            border-radius: 6px;
        }

        .page-container .pagination .disabled {
            color: #94A3B8;
            background: #F8FAFC;
            cursor: not-allowed;
        }

        .page-container .pagination .gap {
            border: none;
            background: transparent;
            color: #64748B;
            min-width: auto;
        }

        .page-container .pagination .page-input {
            width: 44px;
            height: 36px;
            text-align: center;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            color: #1E293B;
        }

        .page-container .pagination .page-input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .page-container .pagination .page-info {
            color: #475569;
        }

        @media (max-width: 768px) {
            .page-container {
                padding: 12px;
            }

            #pagediv {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="page-container">
    <div id="pagediv">
        <div class="header-info">
            <h1 class="page-title">功能权限分配</h1>
            <p class="page-desc">勾选或取消勾选将立即提交授权变更</p>
        </div>
        <a class="btn-back" href="/userFunc/userList">返回用户列表</a>
    </div>

    <form id="form_data" action="/userFunc/sure" method="post">
        <input hidden id="pageNumber" type="text" name="pageNum" value="#(funcs.pageNumber)">
        <input hidden id="input_id" name="id" type="text" value="">
        <input hidden name="userId" type="text" value="#(userId)">
    </form>

    <div class="table-wrapper">
        <table class="list">
            <thead>
            <tr>
                <th width="12%">序号</th>
                <th width="16%">ID</th>
                <th width="30%">功能名称</th>
                <th width="30%">功能路径</th>
                <th width="12%">授权</th>
            </tr>
            </thead>
            <tbody>
            #set(startIndex = (funcs.pageNumber - 1) * funcs.pageSize + 1)
            #for(x : funcs.getList())
            <tr>
                <td>#(startIndex++)</td>
                <td>#(x.id)</td>
                <td>#(x.funName)</td>
                <td>#(x.funUrl)</td>
                <td class="auth-cell">
                    <input class="auth-checkbox" id="#(x.id)" type="checkbox" onclick="newcheck('#(x.id)')">
                </td>
            </tr>
            #end
            </tbody>
        </table>
    </div>

    #@paginate(funcs.pageNumber, funcs.totalPage, "/userFunc/funclist?userId=" + userId + "&pageNum=")

    <input hidden id="haveFunc" type="text" value="#(haveFunc)">
</div>

<script>
    var haveFunc = document.getElementById("haveFunc").value;
    var strIdArr = haveFunc ? haveFunc.split(",") : [];

    for (var i = 0; i < strIdArr.length; i++) {
        var elementById = document.getElementById(strIdArr[i]);
        if (elementById) {
            elementById.checked = true;
        }
    }

    function newcheck(id) {
        document.getElementById("input_id").value = id;
        document.getElementById("form_data").submit();
    }
</script>
</body>
</html>
