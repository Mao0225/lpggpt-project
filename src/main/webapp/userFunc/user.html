<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户功能授权</title>
    <link rel="stylesheet" type="text/css" href="../css/index.css">

    <style>
        body {
            margin: 0;
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        .page-container {
            min-height: 100vh;
            padding: 20px;
            background: #F8FAFC;
        }

        #pagediv {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .page-title {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: #1E293B;
        }

        .page-desc {
            margin: 0;
            color: #64748B;
            font-size: 13px;
        }

        .table-wrapper {
            overflow-x: auto;
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
        }

        table.list {
            width: 100%;
            min-width: 640px;
            border-collapse: collapse;
            background: #FFFFFF;
        }

        table.list th {
            background: #F8FAFC;
            color: #475569;
            font-size: 13px;
            font-weight: 600;
            text-align: left;
            padding: 14px 16px;
            border-bottom: 1px solid #E2E8F0;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        table.list td {
            padding: 14px 16px;
            font-size: 14px;
            color: #1E293B;
            border-bottom: 1px solid #F1F5F9;
            vertical-align: middle;
            white-space: nowrap;
        }

        table.list tbody tr {
            background: #FFFFFF;
            transition: background 0.15s ease;
        }

        table.list tbody tr:nth-child(even) {
            background: #F8FAFC;
        }

        table.list tbody tr:hover {
            background: #F1F5F9;
        }

        table.list tbody tr:last-child td {
            border-bottom: none;
        }

        .operation-link {
            color: #3B82F6;
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .operation-link:hover {
            color: #2563EB;
            text-decoration: underline;
        }

        .page-container .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            color: #475569;
            flex-wrap: wrap;
        }

        .page-container .pagination a,
        .page-container .pagination span:not(.page-info):not(.gap):not(.current) {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            padding: 0 8px;
            font-size: 14px;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            color: #475569;
            background: #FFFFFF;
            text-decoration: none;
            transition: all 0.15s ease;
        }

        .page-container .pagination a:hover {
            background: #F8FAFC;
            border-color: #CBD5E1;
        }

        .page-container .pagination .current {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            padding: 0 8px;
            background: #3B82F6;
            color: #FFFFFF;
            border: 1px solid #3B82F6;
            border-radius: 6px;
        }

        .page-container .pagination .disabled {
            color: #94A3B8;
            background: #F8FAFC;
            cursor: not-allowed;
        }

        .page-container .pagination .gap {
            border: none;
            background: transparent;
            color: #64748B;
            min-width: auto;
        }

        .page-container .pagination .page-input {
            width: 44px;
            height: 36px;
            text-align: center;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            color: #1E293B;
        }

        .page-container .pagination .page-input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .page-container .pagination .page-info {
            color: #475569;
        }

        @media (max-width: 768px) {
            .page-container {
                padding: 12px;
            }

            #pagediv {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="page-container">
    <div id="pagediv">
        <h1 class="page-title">用户功能授权列表</h1>
        <p class="page-desc">点击“授权”进入功能权限分配</p>
    </div>

    <div class="table-wrapper">
        <table class="list">
            <thead>
            <tr>
                <th width="12%">序号</th>
                <th width="30%">姓名</th>
                <th width="30%">密码</th>
                <th width="28%">操作</th>
            </tr>
            </thead>
            <tbody>
            #set(startIndex = (users.pageNumber - 1) * users.pageSize + 1)
            #for(x : users.getList())
            <tr>
                <td>#(startIndex++)</td>
                <td>#(x.username)</td>
                <td>#(x.password)</td>
                <td>
                    <a class="operation-link" href="/userFunc/funclist?userId=#(x.id)">授权</a>
                </td>
            </tr>
            #end
            </tbody>
        </table>
    </div>

    #@paginate(users.pageNumber, users.totalPage, "/userFunc/userList/")
</div>
</body>
</html>
