<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="../css/index.css">
    <style>
        body {
            margin: 0;
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        .form-container {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 20px;
        }

        .form-title {
            margin: 0 0 6px;
            font-size: 16px;
            font-weight: 600;
            color: #1E293B;
        }

        .form-subtitle {
            margin: 0 0 18px;
            font-size: 13px;
            color: #64748B;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin: 0;
        }

        .required {
            color: #EF4444;
            margin-right: 4px;
        }

        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            box-sizing: border-box;
            min-height: 40px;
            padding: 10px 12px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            color: #1E293B;
            font-size: 14px;
            transition: all 0.15s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group input[readonly] {
            background: #F8FAFC;
            color: #64748B;
            cursor: not-allowed;
        }

        .form-group textarea {
            min-height: 88px;
            resize: vertical;
        }

        .image-upload {
            border: 1px dashed #CBD5E1;
            border-radius: 8px;
            background: #F8FAFC;
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .image-upload label {
            margin: 0;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        #equipmentImageInputPreview {
            width: 96px;
            height: 96px;
            object-fit: cover;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            background: #FFFFFF;
        }

        .image-thumb {
            position: relative;
            width: 96px;
            height: 96px;
        }

        .image-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            background: #FFFFFF;
        }

        .image-thumb button {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            border: none;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.65);
            color: #FFFFFF;
            font-size: 12px;
            line-height: 1;
            cursor: pointer;
        }

        .form-footer {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid #E2E8F0;
            color: #64748B;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 14px;
                border-radius: 0;
                border: none;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
        }
    </style>
</head>

<body>
<div class="form-container">
    <h1 class="form-title">运输设备信息</h1>
    <p class="form-subtitle">请填写设备基础信息，点击上级弹窗“保存”提交</p>

    <form id="myForm" action="/setrans/save" method="post">
        <div class="form-grid">
            <div class="form-group">
                <label><span class="required">*</span>设备站点</label>
                <input type="text" value="#(gasstation.station_name)" readonly />
            </div>

            <div class="form-group">
                <label><span class="required">*</span>设备种类</label>
                <select name="equipment.kind">
                    <option value="特种设备">特种设备</option>
                    <option value="易损件">易损件</option>
                    <option value="消防器材">消防器材</option>
                </select>
            </div>

            <input type="hidden" name="equipment.companyid" id="companyidInput" value="#(companyId)">
            <input type="hidden" name="equipment.writer" id="writerInput" value="#(writer)">

            <div class="form-group">
                <label>生产厂商</label>
                <input type="text" name="equipment.factory" value="">
            </div>

            <div class="form-group">
                <label>型号规格</label>
                <input type="text" name="equipment.model" value="">
            </div>

            <div class="form-group">
                <label><span class="required">*</span>设备名称</label>
                <input type="text" name="equipment.name" value="">
            </div>

            <div class="form-group">
                <label>放置位置</label>
                <input type="text" name="equipment.location" value="">
            </div>

            <div class="form-group">
                <label>购买人员</label>
                <input type="text" name="equipment.buyer" value="">
            </div>

            <div class="form-group">
                <label>购买价格</label>
                <input type="text" name="equipment.price" value="">
            </div>

            <div class="form-group">
                <label>购买日期</label>
                <input type="date" name="equipment.buyday">
            </div>

            <div class="form-group">
                <label>生产日期</label>
                <input type="date" name="equipment.producedate">
            </div>

            <div class="form-group">
                <label>上次检修期</label>
                <input type="date" name="equipment.lastcheckdate">
            </div>

            <div class="form-group">
                <label>失效日期</label>
                <input type="date" name="equipment.expiredate">
            </div>

            <div class="form-group full-width">
                <label>备注信息</label>
                <textarea name="equipment.remark"></textarea>
            </div>

            <div class="form-group full-width">
                <label>设备图片</label>
                <div id="equipmentImageInputContainer" class="image-upload">
                    <label for="equipmentImageInput">
                        <img id="equipmentImageInputPreview" src="/img/img_2.png" alt="点击添加图片" title="点击添加图片">
                    </label>
                    <input type="file" id="equipmentImageInput" name="equipment_picture_file" onchange="uploadFile('equipmentImageInput')" accept="image/jpeg, image/png" style="display:none;">
                </div>
                <input type="hidden" id="equipmentImageInputUrl" name="equipment.picture" value="">
            </div>
        </div>
    </form>

    <div class="form-footer">提示：图片上传后将自动写入隐藏字段，保存时一并提交。</div>
</div>

<script>
    function uploadFile(inputElementId) {
        var fileInput = document.getElementById(inputElementId);
        var file = fileInput.files[0];
        if (!file) {
            return;
        }

        var formData = new FormData();
        formData.append("file", file);

        fetch("/equipment/equipmentImageUpload", {
            method: "POST",
            body: formData
        })
            .then(function (response) {
                return response.json();
            })
            .then(function (data) {
                var urlInput = document.getElementById(inputElementId + "Url");
                if (urlInput.value) {
                    urlInput.value += "," + data.url;
                } else {
                    urlInput.value = data.url;
                }

                var container = document.getElementById(inputElementId + "Container");
                if (!container) {
                    return;
                }

                var thumb = document.createElement("div");
                thumb.className = "image-thumb";

                var img = document.createElement("img");
                img.src = data.url;
                thumb.appendChild(img);

                var button = document.createElement("button");
                button.type = "button";
                button.innerText = "×";
                button.onclick = function () {
                    if (thumb.parentNode) {
                        thumb.parentNode.removeChild(thumb);
                    }
                    var urls = urlInput.value.split(",");
                    var urlIndex = urls.indexOf(data.url);
                    if (urlIndex > -1) {
                        urls.splice(urlIndex, 1);
                    }
                    urlInput.value = urls.join(",");
                };
                thumb.appendChild(button);

                container.appendChild(thumb);
            })
            .catch(function (error) {
                console.error("Error:", error);
            });
    }
</script>
</body>
</html>
