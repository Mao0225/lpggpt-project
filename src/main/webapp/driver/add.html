<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增司机</title>
    <style>
        body {
            margin: 0;
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        .page-container {
            padding: 20px;
        }

        .form-container {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 24px;
        }

        .form-title {
            font-size: 16px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #E2E8F0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group-full {
            grid-column: 1 / -1;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-size: 14px;
            font-weight: 500;
        }

        .required {
            color: #EF4444;
            margin-right: 4px;
        }

        .form-group input[type="text"],
        .form-group input[type="date"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            color: #1E293B;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.15s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .image-upload label {
            width: 132px;
            height: 88px;
            border: 2px dashed #CBD5E1;
            border-radius: 6px;
            background: #F8FAFC;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.15s ease;
        }

        .image-upload label:hover {
            border-color: #3B82F6;
            background: #F1F5F9;
        }

        .image-upload img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .action-row {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: all 0.15s ease;
        }

        .btn-primary {
            background: #3B82F6;
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background: #2563EB;
        }

        .btn-secondary {
            background: #FFFFFF;
            color: #475569;
            border: 1px solid #CBD5E1;
        }

        .btn-secondary:hover {
            background: #F8FAFC;
            border-color: #94A3B8;
            color: #334155;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .page-container {
                padding: 12px;
            }

            .form-container {
                padding: 16px;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .action-row {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="page-container">
    <div class="form-container">
        <div class="form-title">新增司机</div>
        <form id="driverForm" action="/driver/save" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label><span class="required">*</span>司机姓名</label>
                    <input type="text" name="driver.drivername" value="" required>
                </div>
                <div class="form-group">
                    <label><span class="required">*</span>联系方式</label>
                    <input type="text" name="driver.driverphone" value="" required>
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <input type="text" name="driver.driversex" value="">
                </div>
                <div class="form-group">
                    <label>出生日期</label>
                    <input type="date" name="driver.driverbirthday" value="">
                </div>
                <div class="form-group">
                    <label>身份证号</label>
                    <input type="text" name="driver.identity_card_no" value="">
                </div>
                <div class="form-group">
                    <label><span class="required">*</span>车牌号</label>
                    <input type="text" name="driver.drivercarno" value="" required>
                </div>
                <div class="form-group">
                    <label>车型</label>
                    <input type="text" name="driver.carname" value="">
                </div>
                <div class="form-group">
                    <label>车辆颜色</label>
                    <input type="text" name="driver.carcolor" value="">
                </div>
                <div class="form-group">
                    <label>车辆生产日期</label>
                    <input type="date" name="driver.carshengchanriqi" value="">
                </div>
                <div class="form-group">
                    <label>危货证件号</label>
                    <input type="text" name="driver.risk_cargo_license_no" value="">
                </div>
                <div class="form-group">
                    <label>危货证件有效期</label>
                    <input type="date" name="driver.risk_cargo_license_indate" value="">
                </div>

                <div class="form-group">
                    <label><span class="required">*</span>车辆照片</label>
                    <div class="image-upload">
                        <label for="carImageInput">
                            <img id="carImageInputPreview" src="/img/img_1.png" alt="点击上传车辆照片">
                        </label>
                        <input type="file" id="carImageInput" name="car_image_file" onchange="uploadFile('carImageInput')" accept="image/jpeg, image/png" style="display:none;">
                    </div>
                    <input type="hidden" id="carImageInputUrl" name="driver.car_image_url">
                </div>

                <div class="form-group">
                    <label><span class="required">*</span>驾驶证照片</label>
                    <div class="image-upload">
                        <label for="driverLicenseImageInput">
                            <img id="driverLicenseImageInputPreview" src="/img/img_1.png" alt="点击上传驾驶证照片">
                        </label>
                        <input type="file" id="driverLicenseImageInput" name="driver_license_image_file" onchange="uploadFile('driverLicenseImageInput')" accept="image/jpeg, image/png" style="display:none;">
                    </div>
                    <input type="hidden" id="driverLicenseImageInputUrl" name="driver.driver_license_image_url">
                </div>

                <div class="form-group form-group-full">
                    <label><span class="required">*</span>危货证件照片</label>
                    <div class="image-upload">
                        <label for="riskCargoLicenseImageUrlInput">
                            <img id="riskCargoLicenseImageUrlInputPreview" src="/img/img_1.png" alt="点击上传危货证件照片">
                        </label>
                        <input type="file" id="riskCargoLicenseImageUrlInput" name="risk_cargo_license_image_file" onchange="uploadFile('riskCargoLicenseImageUrlInput')" accept="image/jpeg, image/png" style="display:none;">
                    </div>
                    <input type="hidden" id="riskCargoLicenseImageUrlInputUrl" name="driver.risk_cargo_license_image_url">
                </div>
            </div>

            <div class="action-row">
                <a class="btn btn-secondary" href="/driver/driverlist">返回列表</a>
                <button class="btn btn-primary" type="submit">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
    function uploadFile(inputElementId) {
        var fileInput = document.getElementById(inputElementId);
        var file = fileInput ? fileInput.files[0] : null;
        if (!file) {
            return;
        }

        var preview = document.getElementById(inputElementId + "Preview");
        if (preview) {
            preview.src = URL.createObjectURL(file);
        }

        var formData = new FormData();
        formData.append("file", file);

        fetch("/driver/upload", {
            method: "POST",
            body: formData
        })
            .then(function (response) {
                return response.json();
            })
            .then(function (data) {
                if (!data || !data.url) {
                    return;
                }
                var urlInput = document.getElementById(inputElementId + "Url");
                if (urlInput) {
                    urlInput.value = data.url;
                }
            })
            .catch(function (error) {
                console.error("Error:", error);
            });
    }
</script>
</body>
</html>
