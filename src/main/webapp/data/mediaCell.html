#if(field && field != "")
#set(urls = field.split(","))
#set(firstUrl = urls[0])
<div class="media-controls" data-urls="#(field)" data-current-index="0">
    <button type="button" onclick="changeMedia(this, -1)">上一张</button>
    #if(firstUrl.endsWith(".jpg") || firstUrl.endsWith(".jpeg") || firstUrl.endsWith(".png") || firstUrl.endsWith(".gif"))
    <img class="media-preview"
         src="#(request.contextPath)#(firstUrl)"
         data-urls="#(field)"
         data-current-index="0"
         onclick="showMedia('#(request.contextPath)#(firstUrl)')">
    #else
    <video class="media-preview"
           controls
           data-urls="#(field)"
           data-current-index="0"
           onclick="showMedia('#(request.contextPath)#(firstUrl)')">
        #if(firstUrl.endsWith(".webm"))
        <source src="#(request.contextPath)#(firstUrl)" type="video/webm">
        #else if(firstUrl.endsWith(".mp4"))
        <source src="#(request.contextPath)#(firstUrl)" type="video/mp4">
        #else if(firstUrl.endsWith(".ogg"))
        <source src="#(request.contextPath)#(firstUrl)" type="video/ogg">
        #else
        <source src="#(request.contextPath)#(firstUrl)" type="video/mp4">
        #end
    </video>
    #end
    <button type="button" onclick="changeMedia(this, 1)">下一张</button>
</div>
#else
<span class="no-media">无内容</span>
#end
