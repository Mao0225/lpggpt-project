<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Edit Restaurant</title>
	<style>
		body {
			background: #FFFFFF;
			color: #1E293B;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
		}

		.form-container {
			background: #FFFFFF;
			padding: 24px;
		}

		.form-group {
			margin-bottom: 20px;
		}

		.form-group label {
			display: block;
			font-size: 14px;
			font-weight: 500;
			color: #475569;
			margin-bottom: 8px;
		}

		.form-group input[type="text"],
		.form-group select {
			width: 100%;
			padding: 10px 14px;
			font-size: 14px;
			border: 1px solid #CBD5E1;
			border-radius: 6px;
			background: #FFFFFF;
			color: #1E293B;
			transition: all 0.15s ease;
			box-sizing: border-box;
		}

		.form-group input:focus,
		.form-group select:focus {
			outline: none;
			border-color: #3B82F6;
			box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
		}
	</style>
</head>
<body style="background-color: #F8FAFC;">
<div class="form-container">
	<form action="/restaurant/update" method="post" id="myForm">
		<input type="hidden" name="restaurant.id" value="#(restaurant.id)">

		<div class="form-group">
			<label>饭店编号</label>
			<input type="text" name="restaurant.restaurantno" value="#(restaurant.restaurantno)">
		</div>

		<div class="form-group">
			<label>饭店名称</label>
			<input type="text" name="restaurant.name" value="#(restaurant.name)">
		</div>

		<div class="form-group">
			<label>饭店店长</label>
			<input type="text" name="restaurant.leader" value="#(restaurant.leader)">
		</div>

		<div class="form-group">
			<label>饭店地址</label>
			<input type="text" name="restaurant.address" value="#(restaurant.address)">
		</div>

		<div class="form-group">
			<label>联系电话</label>
			<input type="text" name="restaurant.telephone" value="#(restaurant.telephone)">
		</div>

		<div class="form-group">
			<label>密码</label>
			<input type="text" name="restaurant.pwd" value="#(restaurant.pwd)">
		</div>

		<div class="form-group">
			<label>小盒子</label>
			<input type="text" name="restaurant.xiaohezi" value="#(restaurant.xiaohezi)">
		</div>

		<div class="form-group">
			<label>报警人</label>
			<input type="text" name="restaurant.baojingren" value="#(restaurant.baojingren)">
		</div>

		<div class="form-group">
			<label>备注</label>
			<input type="text" name="restaurant.memo" value="#(restaurant.memo)">
		</div>

		<div class="form-group">
			<label>设备类型</label>
			<select id="deviceType" name="restaurant.biaoji">
				<option value="1">电子秤</option>
				<option value="2">燃气表</option>
			</select>
		</div>

		<div class="form-group">
			<label id="codeLabel">称/表编码</label>
			<input type="text" name="restaurant.chengno" value="#(restaurant.chengno)" />
		</div>
	</form>
</div>

<script>
	$(document).ready(function() {
		var biaoji = #(restaurant.biaoji);
		$("#deviceType").val(biaoji);

		$('#deviceType').change(function() {
			if ($(this).val() == "1") {
				$('#codeLabel').text('称编码');
			} else if ($(this).val() == "2") {
				$('#codeLabel').text('表编码');
			} else {
				$('#codeLabel').text('称编码/表编码');
			}
		});

		$('#deviceType').trigger('change');
	});
</script>

</body>
</html>
