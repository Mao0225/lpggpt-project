<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Add Restaurant</title>
	<style>
		body {
			background: #FFFFFF;
			color: #1E293B;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
		}

		.form-container {
			background: #FFFFFF;
			padding: 24px;
		}

		.form-group {
			margin-bottom: 20px;
		}

		.form-group label {
			display: block;
			font-size: 14px;
			font-weight: 500;
			color: #475569;
			margin-bottom: 8px;
		}

		.form-group input[type="text"],
		.form-group select {
			width: 100%;
			padding: 10px 14px;
			font-size: 14px;
			border: 1px solid #CBD5E1;
			border-radius: 6px;
			background: #FFFFFF;
			color: #1E293B;
			transition: all 0.15s ease;
			box-sizing: border-box;
		}

		.form-group input:focus,
		.form-group select:focus {
			outline: none;
			border-color: #3B82F6;
			box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
		}
	</style>
</head>
<body style="background-color: #F8FAFC;">
<div class="form-container">
	<form action="/restaurant/save" method="post" id="myForm">
		<div class="form-group">
			<label>饭店编号</label>
			<input type="text" name="restaurant.restaurantno" value="" />
		</div>

		<div class="form-group">
			<label>饭店名称</label>
			<input type="text" name="restaurant.name" value="" />
		</div>

		<div class="form-group">
			<label>饭店店长</label>
			<input type="text" name="restaurant.leader" value="" />
		</div>

		<div class="form-group">
			<label>饭店地址</label>
			<input type="text" name="restaurant.address" value="" />
		</div>

		<div class="form-group">
			<label>联系电话</label>
			<input type="text" name="restaurant.telephone" value="" />
		</div>

		<div class="form-group">
			<label>密码</label>
			<input type="text" name="restaurant.pwd" value="" />
		</div>

		<div class="form-group">
			<label>小盒子</label>
			<input type="text" name="restaurant.xiaohezi" value="" />
		</div>

		<div class="form-group">
			<label>报警人</label>
			<input type="text" name="restaurant.baojingren" value="" />
		</div>

		<div class="form-group">
			<label>备注</label>
			<input type="text" name="restaurant.memo" value="" />
		</div>

		<div class="form-group">
			<label>设备类型</label>
			<select id="deviceType" name="restaurant.biaoji" onchange="displayInput(this.value)">
				<option value="">请选择设备类型</option>
				<option value="1">电子秤</option>
				<option value="2">燃气表</option>
			</select>
		</div>

		<div class="form-group">
			<label id="codeLabel">称/表编码</label>
			<input type="text" name="restaurant.chengno" value="" />
		</div>
	</form>
</div>

<script>
	function displayInput(value) {
		var codeLabel = document.getElementById('codeLabel');
		if (value == "1") {
			codeLabel.innerText = '称编码';
		} else if (value == "2") {
			codeLabel.innerText = '表编码';
		} else {
			codeLabel.innerText = '称/表编码';
		}
	}
</script>
</body>
</html>
