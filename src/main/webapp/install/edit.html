<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安装管理 - 编辑</title>
    <link rel="stylesheet" type="text/css" href="../css/index.css">
    <style>
        /* 浅色商务风格 - 安装管理编辑表单 */
        body {
            background-color: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
        }

        .form_box {
            padding: 24px;
            max-width: 600px;
            margin: 0 auto;
        }

        .form_box > div {
            margin-bottom: 20px;
        }

        .form_box label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
        }

        .form_box input[type="text"] {
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background-color: #FFFFFF;
            color: #1E293B;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.15s ease;
        }

        .form_box input[type="text"]:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form_box input[type="hidden"] {
            display: none;
        }

        /* 表单底部按钮区域 */
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #E2E8F0;
        }

        .form-actions button {
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: none;
        }

        .form-actions button.primary {
            background-color: #3B82F6;
            color: white;
        }

        .form-actions button.primary:hover {
            background-color: #2563EB;
        }

        .form-actions button.secondary {
            background-color: #FFFFFF;
            color: #475569;
            border: 1px solid #CBD5E1;
        }

        .form-actions button.secondary:hover {
            background-color: #F8FAFC;
            border-color: #94A3B8;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .form_box {
                padding: 16px;
            }

            .form-actions {
                flex-direction: column;
            }

            .form-actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="form_box">
    <form action="/install/update" method="post" id="myForm">
        <input type="hidden" name="xiaohezidata.id" value="#(xiaohezidata.id)">

        <div>
            <label>气瓶一</label>
            <input type="text" name="xiaohezidata.gas_number1" value="#(xiaohezidata.gas_number1)" />
        </div>

        <div>
            <label>气瓶二</label>
            <input type="text" name="xiaohezidata.gas_number2" value="#(xiaohezidata.gas_number2)" />
        </div>

        <div>
            <label>气瓶三</label>
            <input type="text" name="xiaohezidata.gas_number3" value="#(xiaohezidata.gas_number3)" />
        </div>

        <div>
            <label>气瓶四</label>
            <input type="text" name="xiaohezidata.gas_number4" value="#(xiaohezidata.gas_number4)" />
        </div>

        <div>
            <label>小盒子编码</label>
            <input type="text" name="xiaohezidata.xiaohezi_number" value="#(xiaohezidata.xiaohezi_number)" />
        </div>

        <div class="form-actions">
            <button type="submit" class="primary">保存</button>
            <button type="button" class="secondary" onclick="window.history.back()">取消</button>
        </div>
    </form>
</div>

</body>
</html>
