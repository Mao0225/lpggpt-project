<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加维修记录</title>
    <style>
        body {
            margin: 0;
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        .form-container {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 20px;
        }

        .form-title {
            margin: 0 0 16px;
            font-size: 16px;
            font-weight: 600;
            color: #1E293B;
            padding-bottom: 12px;
            border-bottom: 1px solid #E2E8F0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px 20px;
        }

        .form-group {
            margin: 0;
        }

        .form-group-full {
            grid-column: 1 / -1;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            color: #1E293B;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            box-sizing: border-box;
            transition: all 0.15s ease;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 88px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 14px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="form-container">
    <h1 class="form-title">添加维修记录</h1>
    <form action="/Cequipment/save" method="post" id="myForm">
        <input type="hidden" id="companyid" name="bseMaintenance.companyid" value="#(companyid)"/>

        <div class="form-grid">
            <div class="form-group">
                <label for="equipmentName">设备名称</label>
                <select id="equipmentName" name="bseMaintenance.equipmentid">
                    <option value="" selected disabled>请选择设备</option>
                    #for (x : equipments)
                    <option value="#(x.id)">#(x.name)</option>
                    #end
                </select>
            </div>

            <div class="form-group">
                <label for="recordType">记录类型</label>
                <select id="recordType" name="bseMaintenance.kind">
                    <option value="维修">维修</option>
                    <option value="维护">维护</option>
                </select>
            </div>

            <div class="form-group">
                <label for="reportDate">报修日期</label>
                <input type="date" id="reportDate" name="bseMaintenance.reportday"/>
            </div>

            <div class="form-group">
                <label for="reporter">报修人员</label>
                <input type="text" id="reporter" name="bseMaintenance.reporter"/>
            </div>

            <div class="form-group form-group-full">
                <label for="mainContent">主要内容</label>
                <textarea id="mainContent" name="bseMaintenance.content"></textarea>
            </div>

            <div class="form-group">
                <label for="repairer">维修人员</label>
                <input type="text" id="repairer" name="bseMaintenance.repairer"/>
            </div>

            <div class="form-group">
                <label for="repairTime">维修时间</label>
                <input type="date" id="repairTime" name="bseMaintenance.repairday"/>
            </div>

            <div class="form-group">
                <label for="step">工单状态</label>
                <select id="step" name="bseMaintenance.step">
                    <option value="进行中">进行中</option>
                    <option value="已完成">已完成</option>
                </select>
            </div>
        </div>
    </form>
</div>
</body>
</html>
