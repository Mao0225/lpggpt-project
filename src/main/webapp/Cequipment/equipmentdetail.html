<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工单详情</title>
    <style>
        body {
            margin: 0;
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        .form-container {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 20px;
        }

        .form-title {
            margin: 0 0 16px;
            font-size: 16px;
            font-weight: 600;
            color: #1E293B;
            padding-bottom: 12px;
            border-bottom: 1px solid #E2E8F0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px 20px;
        }

        .form-group {
            margin: 0;
        }

        .form-group-full {
            grid-column: 1 / -1;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            color: #475569;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #F8FAFC;
            box-sizing: border-box;
        }

        .form-group input[readonly],
        .form-group select[disabled] {
            cursor: default;
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 14px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="form-container">
    <h1 class="form-title">工单详情</h1>
    <form id="detailForm">
        <div class="form-grid">
            <div class="form-group">
                <label>设备名称</label>
                <input type="text" name="equipment_name" value="#(equipmentdetail.equipment_name)" readonly/>
            </div>

            <div class="form-group">
                <label>记录类型</label>
                <input type="text" name="kind" value="#(equipmentdetail.kind)" readonly/>
            </div>

            <div class="form-group">
                <label>型号规格</label>
                <input type="text" name="model" value="#(equipmentdetail.model)" readonly/>
            </div>

            <div class="form-group">
                <label>投用日期</label>
                <input type="text" name="useday" value="#(equipmentdetail.useday)" readonly/>
            </div>

            <div class="form-group">
                <label>放置位置</label>
                <input type="text" name="location" value="#(equipmentdetail.location)" readonly/>
            </div>

            <div class="form-group">
                <label>生产厂家</label>
                <input type="text" name="factory" value="#(equipmentdetail.factory)" readonly/>
            </div>

            <div class="form-group">
                <label>报修时间</label>
                <input type="text" name="reportday" value="#(equipmentdetail.reportday)" readonly/>
            </div>

            <div class="form-group">
                <label>报修人员</label>
                <input type="text" name="reporter" value="#(equipmentdetail.reporter)" readonly/>
            </div>

            <div class="form-group form-group-full">
                <label>主要内容</label>
                <input type="text" name="content" value="#(equipmentdetail.content)" readonly/>
            </div>

            <div class="form-group">
                <label>维修人</label>
                <input type="text" name="repairer" value="#(equipmentdetail.repairer)" readonly/>
            </div>

            <div class="form-group">
                <label>联系电话</label>
                <input type="text" name="phone" value="#(equipmentdetail.phone)" readonly/>
            </div>

            <div class="form-group form-group-full">
                <label>处置过程</label>
                <input type="text" name="process" value="#(equipmentdetail.process)" readonly/>
            </div>

            <div class="form-group">
                <label>备件耗材</label>
                <select id="fittOperateRecordsSelect" name="fittOperateRecords" disabled>
                    #if(fittOperateRecords!= null && fittOperateRecords.size() > 0)
                    #for(fittRecord : fittOperateRecords)
                    <option value="#(fittRecord.name)--#(fittRecord.count)">#(fittRecord.name)--#(fittRecord.count)</option>
                    #end
                    #else
                    <option value="">暂无备件耗材信息</option>
                    #end
                </select>
            </div>

            <div class="form-group">
                <label>完成时间</label>
                <input type="text" name="repairday" value="#(equipmentdetail.repairday)" readonly/>
            </div>

            <div class="form-group form-group-full">
                <label>备注建议</label>
                <input type="text" name="remark" value="#(equipmentdetail.remark)" readonly/>
            </div>
        </div>
    </form>
</div>
</body>
</html>
