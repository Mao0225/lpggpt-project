<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增小盒子</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        .form-container {
            background: #FFFFFF;
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
        }

        .form-group label .required {
            color: #EF4444;
            margin-right: 4px;
        }

        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            color: #1E293B;
            transition: all 0.15s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group input::placeholder {
            color: #94A3B8;
        }

        .help-text {
            margin-top: 6px;
            font-size: 12px;
            color: #64748B;
        }
    </style>
</head>

<body>
<div class="form-container">
    <form id="myForm" action="/xiaohezi/save" method="post">
        <div class="form-group">
            <label><span class="required">*</span>小盒子编号</label>
            <input type="text" name="xiaohezi.xiaohezi_no" value="" placeholder="请输入小盒子编号" required>
        </div>

        <div class="form-group">
            <label><span class="required">*</span>创建人</label>
            <input type="text" name="xiaohezi.writer" value="" placeholder="请输入创建人" required>
        </div>

        <div class="form-group">
            <label><span class="required">*</span>饭店名称</label>
            <select id="selectName" name="restaurant_select" onchange="chooseName()" required>
                <option value="" selected>请选择饭店</option>
                #for (x: restaurants)
                <option value="#(x.id)">#(x.name)</option>
                #end
            </select>
            <div class="help-text">请选择小盒子所属饭店。</div>
        </div>

        <div class="form-group">
            <label>阀门1打开链接</label>
            <input type="text" id="famen1open" name="xiaohezi.famen1open" value="" placeholder="请输入阀门1打开链接">
        </div>

        <div class="form-group">
            <label>阀门1关闭链接</label>
            <input type="text" id="famen1close" name="xiaohezi.famen1close" value="" placeholder="请输入阀门1关闭链接">
        </div>

        <div class="form-group">
            <label>阀门2打开链接</label>
            <input type="text" id="famen2open" name="xiaohezi.famen2open" value="" placeholder="请输入阀门2打开链接">
        </div>

        <div class="form-group">
            <label>阀门2关闭链接</label>
            <input type="text" id="famen2close" name="xiaohezi.famen2close" value="" placeholder="请输入阀门2关闭链接">
        </div>

        <div class="form-group">
            <label>阀门3打开链接</label>
            <input type="text" id="famen3open" name="xiaohezi.famen3open" value="" placeholder="请输入阀门3打开链接">
        </div>

        <div class="form-group">
            <label>阀门3关闭链接</label>
            <input type="text" id="famen3close" name="xiaohezi.famen3close" value="" placeholder="请输入阀门3关闭链接">
        </div>

        <div class="form-group">
            <label>阀门4打开链接</label>
            <input type="text" id="famen4open" name="xiaohezi.famen4open" value="" placeholder="请输入阀门4打开链接">
        </div>

        <div class="form-group">
            <label>阀门4关闭链接</label>
            <input type="text" id="famen4close" name="xiaohezi.famen4close" value="" placeholder="请输入阀门4关闭链接">
        </div>

        <div class="form-group">
            <label>阀门5打开链接</label>
            <input type="text" id="famen5open" name="xiaohezi.famen5open" value="" placeholder="请输入阀门5打开链接">
        </div>

        <div class="form-group">
            <label>阀门5关闭链接</label>
            <input type="text" id="famen5close" name="xiaohezi.famen5close" value="" placeholder="请输入阀门5关闭链接">
        </div>

        <input type="hidden" id="selectedRestaurantId" name="xiaohezi.restaurantid" value="">
        <input type="hidden" id="selectedRestaurantName" name="xiaohezi.restaurant" value="">
    </form>
</div>

<script>
    var restaurants = [
        #for (x: restaurants)
    { id: "#(x.id)", name: "#(x.name)" },
    #end
    ];

    function chooseName() {
        var selectName = document.getElementById("selectName").value;
        var selectedRestaurant = restaurants.find(function (restaurant) {
            return restaurant.id === selectName;
        });

        if (selectedRestaurant) {
            document.getElementById("selectedRestaurantId").value = selectedRestaurant.id;
            document.getElementById("selectedRestaurantName").value = selectedRestaurant.name;
        } else {
            document.getElementById("selectedRestaurantId").value = "";
            document.getElementById("selectedRestaurantName").value = "";
        }
    }

    document.getElementById("famen1open").value = "http://39.98.221.201:9337/updateCommand/FT00000020/ValveStatus1=0";
    document.getElementById("famen1close").value = "http://39.98.221.201:9337/updateCommand/FT00000020/ValveStatus1=1";
    document.getElementById("famen2open").value = "http://39.98.221.201:9337/updateCommand/FT00000020/ValveStatus2=0";
    document.getElementById("famen2close").value = "http://39.98.221.201:9337/updateCommand/FT00000020/ValveStatus2=1";
    document.getElementById("famen3open").value = "http://39.98.221.201:9337/updateCommand/FT00000020/ValveStatus3=0";
    document.getElementById("famen3close").value = "http://39.98.221.201:9337/updateCommand/FT00000020/ValveStatus3=1";
    document.getElementById("famen4open").value = "http://39.98.221.201:9337/updateCommand/FT00000020/ValveStatus4=0";
    document.getElementById("famen4close").value = "http://39.98.221.201:9337/updateCommand/FT00000020/ValveStatus4=1";
    document.getElementById("famen5open").value = "http://39.98.221.201:9337/updateCommand/FT00000020/ValveStatus5=0";
    document.getElementById("famen5close").value = "http://39.98.221.201:9337/updateCommand/FT00000020/ValveStatus5=1";

    document.getElementById("myForm").addEventListener("submit", function () {
        chooseName();
    });
</script>
</body>
</html>
