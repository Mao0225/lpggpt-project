<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑小盒子</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        .form-container {
            background: #FFFFFF;
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
        }

        .form-group label .required {
            color: #EF4444;
            margin-right: 4px;
        }

        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            color: #1E293B;
            transition: all 0.15s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group input::placeholder {
            color: #94A3B8;
        }

        .help-text {
            margin-top: 6px;
            font-size: 12px;
            color: #64748B;
        }
    </style>
</head>

<body>
<div class="form-container">
    <form id="myForm" action="/xiaohezi/update" method="post">
        <input type="hidden" name="xiaohezi.id" value="#(id)">

        <div class="form-group">
            <label><span class="required">*</span>小盒子编号</label>
            <input type="text" name="xiaohezi.xiaohezi_no" value="#(xiaohezi.xiaohezi_no??)" placeholder="请输入小盒子编号" required>
        </div>

        <div class="form-group">
            <label><span class="required">*</span>创建人</label>
            <input type="text" name="xiaohezi.writer" value="#(xiaohezi.writer??)" placeholder="请输入创建人" required>
        </div>

        <div class="form-group">
            <label><span class="required">*</span>饭店名称</label>
            <select id="selectName" name="xiaohezi.restaurantid" onchange="chooseName()" required>
                #set(hasSelected = false)
                #for (x: restaurants)
                #if ("" + x.id == xiaohezi.restaurantid)
                <option value="#(x.id)" selected>#(x.name)</option>
                #set(hasSelected = true)
                #else
                <option value="#(x.id)">#(x.name)</option>
                #end
                #end
                #if (!hasSelected)
                <option value="" selected>请选择饭店</option>
                #end
            </select>
            <div class="help-text">请选择小盒子所属饭店。</div>
        </div>

        #set(selectedRestaurantName = '')
        #for (x: restaurants)
        #if ("" + x.id == xiaohezi.restaurantid)
        #set(selectedRestaurantName = x.name)
        #break
        #end
        #end
        <input type="hidden" id="selectedRestaurantName" name="xiaohezi.restaurant" value="#(selectedRestaurantName)">

        <div class="form-group">
            <label>阀门1打开链接</label>
            <input type="text" id="famen1open" name="xiaohezi.famen1open" value="#(xiaohezi.famen1open??)" placeholder="请输入阀门1打开链接">
        </div>

        <div class="form-group">
            <label>阀门1关闭链接</label>
            <input type="text" id="famen1close" name="xiaohezi.famen1close" value="#(xiaohezi.famen1close??)" placeholder="请输入阀门1关闭链接">
        </div>

        <div class="form-group">
            <label>阀门2打开链接</label>
            <input type="text" id="famen2open" name="xiaohezi.famen2open" value="#(xiaohezi.famen2open??)" placeholder="请输入阀门2打开链接">
        </div>

        <div class="form-group">
            <label>阀门2关闭链接</label>
            <input type="text" id="famen2close" name="xiaohezi.famen2close" value="#(xiaohezi.famen2close??)" placeholder="请输入阀门2关闭链接">
        </div>

        <div class="form-group">
            <label>阀门3打开链接</label>
            <input type="text" id="famen3open" name="xiaohezi.famen3open" value="#(xiaohezi.famen3open??)" placeholder="请输入阀门3打开链接">
        </div>

        <div class="form-group">
            <label>阀门3关闭链接</label>
            <input type="text" id="famen3close" name="xiaohezi.famen3close" value="#(xiaohezi.famen3close??)" placeholder="请输入阀门3关闭链接">
        </div>

        <div class="form-group">
            <label>阀门4打开链接</label>
            <input type="text" id="famen4open" name="xiaohezi.famen4open" value="#(xiaohezi.famen4open??)" placeholder="请输入阀门4打开链接">
        </div>

        <div class="form-group">
            <label>阀门4关闭链接</label>
            <input type="text" id="famen4close" name="xiaohezi.famen4close" value="#(xiaohezi.famen4close??)" placeholder="请输入阀门4关闭链接">
        </div>

        <div class="form-group">
            <label>阀门5打开链接</label>
            <input type="text" id="famen5open" name="xiaohezi.famen5open" value="#(xiaohezi.famen5open??)" placeholder="请输入阀门5打开链接">
        </div>

        <div class="form-group">
            <label>阀门5关闭链接</label>
            <input type="text" id="famen5close" name="xiaohezi.famen5close" value="#(xiaohezi.famen5close??)" placeholder="请输入阀门5关闭链接">
        </div>
    </form>
</div>

<script>
    var restaurants = [
        #for (x: restaurants)
    { id: "#(x.id)", name: "#(x.name)" },
    #end
    ];

    function chooseName() {
        var selectName = document.getElementById("selectName").value;
        var selectedRestaurant = restaurants.find(function (restaurant) {
            return restaurant.id === selectName;
        });

        if (selectedRestaurant) {
            document.getElementById("selectedRestaurantName").value = selectedRestaurant.name;
        } else {
            document.getElementById("selectedRestaurantName").value = "";
        }
    }

    document.getElementById("selectName").addEventListener("change", chooseName);
</script>
</body>
</html>
