<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑订单</title>
    <style>
        /* 浅色商务风格 - 表单 */
        body {
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        .form_box {
            background: #FFFFFF;
            padding: 24px;
            border-radius: 8px;
        }

        .form_box form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form_box div {
            display: flex;
            flex-direction: column;
        }

        .form_box label {
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
        }

        .form_box input[type="text"],
        .form_box select {
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            color: #1E293B;
            transition: all 0.15s ease;
        }

        .form_box input[type="text"]:focus,
        .form_box select:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>
<div class="form_box">
    <form action="/oorderinfo/update" method="post" id="myForm">
        <input type="hidden" name="order.id" value="#(order.id)">
        <input type="hidden" name="order.bid" value="#(bid)">
        <div>
            <label>订气顾客</label>
            <input type="text" name="order.custormer" value="#(order.custormer)">
        </div>

        <div>
            <label>订气数量</label>
            <input type="text" name="order.number" value="#(order.number)">
        </div>
        <div>
            <label>总价格</label>
            <input type="text" name="order.price" value="#(order.price)">
        </div>
        <div>
            <label>加气站</label>
            <select id="SelectName" name="order.station">
                #for(x : gastations)
                <option value="#(x.station_name)"
                        #if(order.station == x.station_name) selected #end>
                    #(x.station_name)
                </option>
                #end
            </select>
        </div>
        <div>
            <label>运送司机</label>
            <input type="text" name="order.driver" value="#(order.driver)">
        </div>
    </form>
</div>
</body>
</html>
