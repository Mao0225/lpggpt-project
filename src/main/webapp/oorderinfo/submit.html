<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接单信息</title>
    <style>
        /* 浅色商务风格 - 表单 */
        body {
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        .form_box {
            background: #FFFFFF;
            padding: 24px;
            border-radius: 8px;
        }

        .form_box form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form_box div {
            display: flex;
            flex-direction: column;
        }

        .form_box label {
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
        }

        .form_box input[type="text"],
        .form_box input[type="datetime-local"],
        .form_box select {
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            color: #1E293B;
            transition: all 0.15s ease;
        }

        .form_box input[type="text"]:focus,
        .form_box input[type="datetime-local"]:focus,
        .form_box select:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>
<div class="form_box">
    <form action="/oorderinfo/update" method="post" id="myForm">
        <input type="hidden" name="order.id" value="#(id)">
        <input type="hidden" name="order.bid" value="#(bid)">
        <input type="hidden" name="order.jiedanstatus" value="1">
        <div>
            <label>总价格</label>
            <input type="text" name="order.price" value="">
        </div>
        <div>
            <label>接单时间</label>
            <input type="datetime-local"
                   name="order.jiedanshijian"
                   value="#(currentTime)">
        </div>
        <div>
            <label>配送司机</label>
            <select id="selectName" name="order.driver">
                <option value="" selected>选择司机</option>
                #for (x: drivers)
                <option value="#(x.drivername)">#(x.drivername)</option>
                #end
            </select>
        </div>
    </form>
</div>
<script>
    var drivers = [
        #for (x: drivers)
    { id: "#(x.id)", name: "#(x.drivername)" },
    #end
    ];

    function chooseName() {
        const selectElement = document.getElementById("selectName");
        const selectedId = selectElement.value;
        const selectedOption = selectElement.options[selectElement.selectedIndex];

        const driverName = selectedOption.getAttribute('data-name');
        document.getElementById('driverName').value = driverName;

        console.log("选中的司机ID:", selectedId);
        console.log("选中的司机姓名:", driverName);

        const selectedDriver = drivers.find(driver => driver.id === selectedId);
        console.log("完整司机对象:", selectedDriver);
    }
</script>
</body>
</html>
