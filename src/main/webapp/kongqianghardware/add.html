<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加控枪硬件</title>
    <style>
        body {
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
        }

        .form-container {
            background: #FFFFFF;
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
        }

        .required {
            color: #EF4444;
            margin-right: 4px;
        }

        .form-group input[type="text"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            color: #1E293B;
            transition: all 0.15s ease;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 84px;
        }

        .form-group .help-text {
            font-size: 12px;
            color: #64748B;
            margin-top: 6px;
        }

        ::placeholder {
            color: #94A3B8;
        }
    </style>
</head>

<body>
<div class="form-container">
    <form id="myForm" action="/kongqianghardware/save" method="post">
        <div class="form-group">
            <label><span class="required">*</span>硬件编号</label>
            <input type="text" name="hardware.hardwareno" value="" placeholder="请输入硬件编号" required />
        </div>

        <div class="form-group">
            <label><span class="required">*</span>公司名称</label>
            <select id="selectName" name="hardware.stationid" required>
                <option value="" selected>请选择公司</option>
                #for (x: gastations)
                <option value="#(x.id)">#(x.station_name)</option>
                #end
            </select>
        </div>

        <div class="form-group">
            <label>创建时间</label>
            <input type="text" name="hardware.createtime" value="" placeholder="请输入创建时间" />
        </div>

        <div class="form-group">
            <label>创建人</label>
            <input type="text" name="hardware.creater" value="" placeholder="请输入创建人" />
        </div>

        <div class="form-group">
            <label>状态</label>
            <input type="text" name="hardware.status" value="" placeholder="请输入状态" />
        </div>

        <div class="form-group">
            <label>类型</label>
            <input type="text" name="hardware.type" value="" placeholder="请输入类型" />
        </div>

        <div class="form-group">
            <label>备注</label>
            <textarea name="hardware.memo" placeholder="请输入备注"></textarea>
        </div>
    </form>
</div>
</body>

</html>
