<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>编辑用户</title>
	<style>
		body {
			margin: 0;
			padding: 0;
			background: #FFFFFF;
			color: #1E293B;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
		}

		.form-container {
			background: #FFFFFF;
			border: 1px solid #E2E8F0;
			border-radius: 8px;
			padding: 20px;
		}

		.form-group {
			margin-bottom: 20px;
		}

		.form-group label {
			display: block;
			font-size: 14px;
			font-weight: 500;
			color: #475569;
			margin-bottom: 8px;
		}

		.form-group input[type="text"],
		.form-group select {
			width: 100%;
			padding: 10px 14px;
			font-size: 14px;
			border: 1px solid #CBD5E1;
			border-radius: 6px;
			background: #FFFFFF;
			color: #1E293B;
			transition: all 0.15s ease;
			box-sizing: border-box;
		}

		.form-group input:focus,
		.form-group select:focus {
			outline: none;
			border-color: #3B82F6;
			box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
		}

		.form-group input[readonly] {
			background: #F8FAFC;
			color: #64748B;
			cursor: not-allowed;
		}
	</style>
</head>
<body>
<div class="form-container">
	<form action="/user/update" method="post" id="myForm">
		<input type="hidden" name="user.id" value="#(user.id??)" />

		<div class="form-group">
			<label>登录账号</label>
			<input type="text" id="user_name" name="user.username" value="#(user.username)" />
		</div>

		<div class="form-group">
			<label>电话</label>
			<input type="text" id="user_telephone" name="user.telephone" value="#(user.telephone)" />
		</div>

		<div class="form-group">
			<label>密码</label>
			<input type="text" name="user.password" value="#(user.password)" />
		</div>

		<div class="form-group">
			<label>公司</label>
			<select id="selectCompany" name="user.company" onchange="chooseCompany()">
				<option value="-1" selected>#(user.company)</option>
				#for ( x: gasstations)
				<option value="#(x.id)">#(x.station_name)</option>
				#end
			</select>
		</div>

		<div class="form-group">
			<label>出生日期</label>
			<input type="text" name="user.birthday" value="#(user.birthday)" />
		</div>

		<div class="form-group">
			<label>性别</label>
			<input type="text" name="user.sex" value="#(user.sex)" />
		</div>

		<div class="form-group">
			<label>公司id</label>
			<input type="text" id="user_companyid" name="user.companyid" value="#(user.companyid)" />
		</div>

		<input type="hidden" id="user_company" name="user.company" value="#(user.company)" >
	</form>
</div>

<script>
	var jsonData = '#(com.alibaba.fastjson.JSONArray::toJSON(gasstations))';
	var context = JSON.parse(jsonData.replace(/#/g, ""));

	function chooseCompany() {
		var selectId = document.getElementById("selectCompany").value;

		if (selectId == "-1") {
			return;
		}

		var selectedgasstation = context.find(function(gasstation) {
			return gasstation.id == selectId;
		});

		if (selectedgasstation) {
			document.getElementById("user_company").value = selectedgasstation.stationName;
			document.getElementById("user_companyid").value = selectedgasstation.stationId;
		} else {
			document.getElementById("user_company").value = "";
			document.getElementById("user_companyid").value = "";
			alert('找不到！');
		}
	}
	document.getElementById("selectCompany").addEventListener("change", chooseCompany);
</script>
</body>
</html>
