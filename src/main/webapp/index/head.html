<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>LPG运营平台</title>
	<!-- Add your custom stylesheets and scripts here -->
	<style>
		/* 工业极简主义风格 - 顶部导航栏 */
		body {
			margin: 0;
			padding: 0;
			background-color: #111827; /* 主背景色 */
			height: 64px; /* 统一高度 */
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0 24px;
			box-sizing: border-box;
			font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
			border-bottom: 1px solid #374151; /* 底部边框 */
		}
		.header-left {
			display: flex;
			align-items: center;
			gap: 16px;
		}
		.header-logo {
			width: 36px;
			height: 36px;
		}
		.header-title {
			font-size: 20px;
			font-weight: 600;
			color: #F9FAFB; /* 主要文字色 */
			line-height: 1;
			letter-spacing: 0.5px;
		}
		.header-exit {
			display: flex;
			align-items: center;
			gap: 8px;
			color: #9CA3AF; /* 次要文字色 */
			text-decoration: none;
			font-size: 14px;
			font-weight: 500;
			transition: all 0.15s ease;
			padding: 8px 12px;
			border-radius: 6px;
			background-color: transparent;
		}
		.header-exit:hover {
			background-color: #374151; /* 悬停背景色 */
			color: #F9FAFB;
		}
		.header-exit img {
			width: 20px;
			height: 20px;
			filter: brightness(0) invert(0.8); /* 灰色图标 */
		}
		.header-exit:hover img {
			filter: brightness(0) invert(1); /* 悬停时白色图标 */
		}
	</style>
</head>
<body>
<div class="header-left">
	<img class="header-logo" src="../img/ft.logo.png" alt="Logo"/>
	<span class="header-title">LPG智慧运营平台</span>
</div>
<a class="header-exit" href="/logout" target="_top">
	<img src="../img/sysexit.png" alt="Exit"/>
	<span>退出登录</span>
</a>
</body>
</html>
