<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>左侧菜单</title>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
	<style>
		/* 工业极简主义风格 - 独立菜单页面 */
		body {
			margin: 0;
			padding: 0;
			height: 100vh;
			overflow: hidden;
			background-color: #111827; /* 主背景色 */
			font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
		}

		/* 定义菜单容器的样式 */
		#menu {
			width: 260px; /* 侧边栏标准宽度 */
			border: 1px solid #374151; /* 边框颜色 */
			border-radius: 8px; /* 标准圆角 */
			margin: 20px;
			max-height: calc(100vh - 40px);
			background-color: #1F2937; /* 次级背景色 */
			overflow-y: auto;
			overflow-x: hidden;
		}

		/* 定义菜单项的样式 */
		.menu-item {
			padding: 12px 16px;
			border-bottom: 1px solid #374151; /* 边框颜色 */
			transition: background-color 0.15s ease;
		}

		/* 移除最后一个菜单项的下边框 */
		.menu-item:last-child {
			border-bottom: none;
		}

		/* 定义菜单项链接的样式 */
		.menu-item a {
			color: #9CA3AF; /* 次要文字色 */
			text-decoration: none;
			display: block;
			font-size: 14px;
			font-weight: 500;
			transition: color 0.15s ease;
		}

		/* 鼠标悬停时菜单项的样式 */
		.menu-item:hover {
			background-color: #374151; /* 悬停背景色 */
		}

		.menu-item:hover a {
			color: #F9FAFB; /* 主要文字色 */
		}
	</style>
	<script>
		$(document).ready(function() {
			// 发起Ajax请求获取菜单数据
			$.ajax({
				url: '/menu/getMenuList', // 这里填写获取菜单列表的接口路径
				type: 'GET',
				dataType: 'json',
				success: function(data) {
					// 成功获取到菜单数据后，将菜单渲染到页面上
					renderMenu(data);
				},
				error: function(xhr, status, error) {
					console.error('Failed to retrieve menu data:', error);
				}
			});

			// 渲染菜单到页面上
			function renderMenu(menuList) {
				var menuHtml = '';
				for (var i = 0; i < menuList.length; i++) {
					menuHtml += '<div class="menu-item"><a href="' + menuList[i].url + '">' + menuList[i].name + '</a></div>';
				}
				$('#menu').html(menuHtml);
			}
		});
	</script>
</head>
<body>
<div id="menu">
	<!-- 菜单将在页面加载时通过JavaScript渲染到这里 -->
</div>
</body>
</html>
