<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>页脚</title>
	<!-- Add your custom stylesheets and scripts here -->
	<style>
		/* 工业极简主义风格 - 页脚 */
		body {
			margin: 0;
			padding: 0;
			background-color: #111827; /* 主背景色 */
			font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
			border-top: 1px solid #374151; /* 顶部边框 */
		}
		html, body {
			min-height: 100vh;
		}

		#footer {
			padding: 24px 20px;
			text-align: center;
			font-size: 12px;
			font-weight: 500;
			color: #6B7280; /* 弱化文字色 */
			letter-spacing: 0.5px;
		}
		#footer a {
			color: #9CA3AF; /* 次要文字色 */
			text-decoration: none;
			transition: color 0.15s ease;
		}
		#footer a:hover {
			color: #3B82F6; /* 安全蓝 */
		}
	</style>
</head>
<body>
<div id="footer">
	Copyright 1998 - 2024 Fengtian. All Rights Reserved
</div>
</body>
</html>
