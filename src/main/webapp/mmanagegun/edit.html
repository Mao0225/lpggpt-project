<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑加气枪</title>
    <style>
        /* 浅色商务风格 - 表单 */
        body {
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        .form_box {
            background: #FFFFFF;
            padding: 24px;
            border-radius: 8px;
        }

        .form_box form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form_box div {
            display: flex;
            flex-direction: column;
        }

        .form_box label {
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
        }

        .form_box input[type="text"],
        .form_box select {
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            color: #1E293B;
            transition: all 0.15s ease;
        }

        .form_box input[type="text"]:focus,
        .form_box select:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>

<body>
<div class="form_box">
    <form id="myForm" action="/mmanagegun/update" method="post">
        <input type="hidden" name="gun.id" value="#(record.id)" />
        <div>
            <label>加气枪抢号</label>
            <input type="text" name="gun.gunno"  value="#(record.gunno)"/>
        </div>
        <div>
            <label>操作</label>
            <input type="text" name="gun.caozuo"  value="#(record.caozuo)"/>
        </div>
        <div>
            <label>公司名称</label>
            <input type="hidden" id="gstation" name="custromer.station" value="" readonly />
            <input type="hidden" id="gstationid" name="gun.stationid" value="" readonly />
            <select id="SelectName" name="custromer.station" disabled>
            </select>
        </div>
    </form>
</div>
<script>
    var gastations = [
        #for ( x: gastations)
    { id: "#(x.id)", station_name: "#(x.station_name)" },
    #end
    ];
    console.log("gstations.length: " + gastations.length);
    if (gastations.length === 1) {
        console.log("okkkkkkkkkk");
        var gstation = gastations[0];
        console.log(gstation.station_name);
        console.log(gstation.id);
        document.getElementById("gstation").value = gstation.station_name;
        document.getElementById("gstationid").value = gstation.id;
        var option = document.createElement('option');
        option.value = gstation.id;
        option.textContent = gstation.station_name;
        option.selected = true;
        document.getElementById("SelectName").appendChild(option);
    }
</script>
</html>
