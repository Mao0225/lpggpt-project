<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建气瓶档案（G）</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        .form-container {
            background: #FFFFFF;
            padding: 24px;
        }

        .form-section {
            margin-bottom: 24px;
        }

        .form-section-title {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #E2E8F0;
            font-size: 14px;
            font-weight: 600;
            color: #1E293B;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
        }

        .form-group label .required {
            color: #EF4444;
            margin-right: 4px;
        }

        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            color: #1E293B;
            box-sizing: border-box;
            transition: all 0.15s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group input::placeholder {
            color: #94A3B8;
        }

        .tip-text {
            margin-top: 6px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="form-container">
    <form id="myForm" action="/GGasFile/save" method="post">
        <div class="form-section">
            <div class="form-section-title">基本信息</div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="gas_file.gas_number"><span class="required">*</span>气瓶编号</label>
                    <input type="text" id="gas_file.gas_number" name="gas_file.gas_number" value="" onblur="checkGasNumberDuplicate()" required>
                    <span id="gasNumberTip" class="tip-text"></span>
                </div>
                <div class="form-group">
                    <label>奉天编码</label>
                    <input type="text" id="gas_file.fengtiangasno" name="gas_file.fengtiangasno" value="">
                </div>
                <div class="form-group">
                    <label>镂空码</label>
                    <input type="text" id="gas_file.loukongno" name="gas_file.loukongno" value="">
                </div>
                <div class="form-group">
                    <label><span class="required">*</span>加气站名字</label>
                    <input type="hidden" id="gas_file.gasstationid" name="gas_file.gasstationid" value="" readonly>
                    <input type="hidden" id="gas_file.stationid" name="gas_file.stationid" value="" readonly>
                    <input type="hidden" id="gas_file.filing_gas_station" name="gas_file.filing_gas_station" value="" readonly>
                    <select id="selectName" name="station_selector" onchange="chooseName()" required>
                        <option value="">请选择加气站</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">制造与检验信息</div>
            <div class="form-grid">
                <div class="form-group"><label>制造单位</label><input type="text" name="gas_file.manufacture_unit" value=""></div>
                <div class="form-group"><label>电子标签</label><input type="text" name="gas_file.valve_body_code" value=""></div>
                <div class="form-group"><label>气瓶使用登记证编号</label><input type="text" name="gas_file.qpsydjzbh" value="瓶30辽AF00008（18）"></div>
                <div class="form-group"><label>制造日期</label><input type="text" name="gas_file.manufacture_date" value="" placeholder="YYYY-MM-DD"></div>
                <div class="form-group"><label>检验日期</label><input type="text" name="gas_file.inspect_date" value="" placeholder="YYYY-MM-DD"></div>
                <div class="form-group"><label>定检日期</label><input type="text" name="gas_file.regular_check_date" value="" placeholder="YYYY-MM-DD"></div>
                <div class="form-group"><label>终止使用日期</label><input type="text" name="gas_file.terminate_use_date" value="" placeholder="YYYY-MM-DD"></div>
                <div class="form-group"><label>建档时间</label><input type="text" id="gas_file.jiandangshijian" name="gas_file.jiandangshijian" value="" placeholder="YYYY-MM-DD"></div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">规格参数</div>
            <div class="form-grid">
                <div class="form-group"><label>设备品种</label><input type="text" name="gas_file.monitoring_station" value="焊接气瓶"></div>
                <div class="form-group"><label>充装规格</label><input type="text" name="gas_file.filling_specification" value="15"></div>
                <div class="form-group"><label>气瓶型号</label><input type="text" name="gas_file.gas_specification" value="YSP35.5"></div>
                <div class="form-group"><label>充装介质</label><input type="text" name="gas_file.filling_medium" value="液化石油气"></div>
                <div class="form-group"><label>许可证号</label><input type="text" name="gas_file.xukezhenghao" value="TS2210Q02"></div>
                <div class="form-group"><label>公称压力</label><input type="text" name="gas_file.gongchengyali" value="2.1"></div>
                <div class="form-group"><label>水试验压</label><input type="text" name="gas_file.shuishiyanya" value="3.2"></div>
                <div class="form-group"><label>容积</label><input type="text" name="gas_file.rongji" value="35.5"></div>
                <div class="form-group"><label>壁厚</label><input type="text" name="gas_file.bihou" value="2.5"></div>
                <div class="form-group"><label>气瓶自重KG</label><input type="text" name="gas_file.gas_suttle" value="16"></div>
                <div class="form-group"><label>是否专用</label><input type="text" name="gas_file.shifouzhuanyong" value="专用"></div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">使用者信息</div>
            <div class="form-grid">
                <div class="form-group"><label>使用者名称</label><input type="text" name="gas_file.shiyongzhemingcheng" value=""></div>
                <div class="form-group"><label>地址</label><input type="text" name="gas_file.shiyongzhedizhi" value=""></div>
                <div class="form-group"><label>电话</label><input type="text" name="gas_file.shiyongzhedianhua" value=""></div>
                <div class="form-group"><label>经度</label><input type="text" name="gas_file.shiyongzhejingdu" value=""></div>
                <div class="form-group"><label>纬度</label><input type="text" name="gas_file.shiyongzheweidu" value=""></div>
            </div>
        </div>
    </form>
</div>

<script>
    var currentDate = new Date();
    var year = currentDate.getFullYear();
    var month = ('0' + (currentDate.getMonth() + 1)).slice(-2);
    var day = ('0' + currentDate.getDate()).slice(-2);
    document.getElementById('gas_file.jiandangshijian').value = year + '-' + month + '-' + day;

    var context = [];
    try {
        var jsonData = '#(com.alibaba.fastjson.JSONArray::toJSON(gasstations))';
        context = JSON.parse(jsonData.replace(/#/g, ''));
    } catch (error) {
        context = [];
    }

    function initStationOptions() {
        var selectElement = document.getElementById('selectName');
        var i;
        var option;

        if (!selectElement) {
            return;
        }

        while (selectElement.options.length > 1) {
            selectElement.remove(1);
        }

        for (i = 0; i < context.length; i++) {
            option = document.createElement('option');
            option.value = context[i].id;
            option.textContent = context[i].stationName || context[i].station_name;
            selectElement.appendChild(option);
        }

        if (context.length === 1) {
            selectElement.value = String(context[0].id);
            selectElement.disabled = true;
            chooseName();
        }
    }

    function chooseName() {
        var selectValue = document.getElementById('selectName').value;
        var selectedStation = context.find(function (station) {
            return String(station.id) === String(selectValue);
        });

        if (selectedStation) {
            document.getElementById('gas_file.gasstationid').value = selectedStation.id;
            document.getElementById('gas_file.stationid').value = selectedStation.id;
            document.getElementById('gas_file.filing_gas_station').value = selectedStation.stationName || selectedStation.station_name;
        } else {
            document.getElementById('gas_file.gasstationid').value = '';
            document.getElementById('gas_file.stationid').value = '';
            document.getElementById('gas_file.filing_gas_station').value = '';
        }

        checkGasNumberDuplicate();
    }

    function checkGasNumberDuplicate() {
        var tip = document.getElementById('gasNumberTip');
        var gasNumber = document.getElementById('gas_file.gas_number').value.trim();
        var stationId = document.getElementById('gas_file.stationid').value.trim();
        var xhr;
        var requestUrl;

        if (!tip) {
            return;
        }

        if (!gasNumber) {
            tip.innerText = '气瓶编号不能为空！';
            tip.style.color = '#EF4444';
            return;
        }

        if (!stationId || stationId === '-1') {
            tip.innerText = '请先选择加气站！';
            tip.style.color = '#EF4444';
            return;
        }

        xhr = window.XMLHttpRequest ? new XMLHttpRequest() : new ActiveXObject('Microsoft.XMLHTTP');
        requestUrl = '/gasFile/checkGasNumber?gasNumber=' + encodeURIComponent(gasNumber) + '&stationId=' + encodeURIComponent(stationId);

        xhr.open('GET', requestUrl, true);
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    if (xhr.responseText === 'duplicate') {
                        tip.innerText = '当前加气站下该气瓶编号已存在！';
                        tip.style.color = '#EF4444';
                    } else {
                        tip.innerText = '气瓶编号可用';
                        tip.style.color = '#10B981';
                    }
                } else {
                    tip.innerText = '验证失败，请重试';
                    tip.style.color = '#EF4444';
                }
            }
        };
        xhr.onerror = function () {
            tip.innerText = '网络异常，校验失败';
            tip.style.color = '#EF4444';
        };
        xhr.send();
    }

    document.addEventListener('DOMContentLoaded', function () {
        initStationOptions();
        document.getElementById('selectName').addEventListener('change', chooseName);
        document.getElementById('myForm').addEventListener('submit', function () {
            chooseName();
        });
    });
</script>
</body>
</html>
