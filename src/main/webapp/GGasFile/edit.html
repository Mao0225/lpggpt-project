<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑气瓶档案（G）</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        .form-container {
            background: #FFFFFF;
            padding: 24px;
        }

        .form-section {
            margin-bottom: 24px;
        }

        .form-section-title {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #E2E8F0;
            font-size: 14px;
            font-weight: 600;
            color: #1E293B;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
        }

        .form-group label .required {
            color: #EF4444;
            margin-right: 4px;
        }

        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            color: #1E293B;
            box-sizing: border-box;
            transition: all 0.15s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group input::placeholder {
            color: #94A3B8;
        }

        .tip-text {
            margin-top: 6px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="form-container">
    <form id="myForm" action="/GGasFile/update" method="post">
        <input type="hidden" name="gas_file.id" value="#(gas_file.id??)" id="gasFileId">

        <div class="form-section">
            <div class="form-section-title">基本信息</div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="gas_file.gas_number"><span class="required">*</span>气瓶编号</label>
                    <input type="text" id="gas_file.gas_number" name="gas_file.gas_number" value="#(gas_file.gas_number)" onblur="checkGasNumberDuplicate()" required>
                    <span id="gasNumberTip" class="tip-text"></span>
                </div>
                <div class="form-group">
                    <label>奉天编码</label>
                    <input type="text" id="gas_file.fengtiangasno" name="gas_file.fengtiangasno" value="#(gas_file.fengtiangasno)">
                </div>
                <div class="form-group">
                    <label>镂空码</label>
                    <input type="text" id="gas_file.loukongno" name="gas_file.loukongno" value="#(gas_file.loukongno)">
                </div>
                <div class="form-group">
                    <label><span class="required">*</span>加气站名字</label>
                    <input type="hidden" id="gas_file.gasstationid" name="gas_file.gasstationid" value="#(gas_file.gasstationid??)" readonly>
                    <input type="hidden" id="gas_file.stationid" name="gas_file.stationid" value="#(gas_file.stationid?? gas_file.gasstationid??)" readonly>
                    <input type="hidden" id="gas_file.filing_gas_station" name="gas_file.filing_gas_station" value="#(gas_file.filing_gas_station??)" readonly>
                    <select id="selectName" name="station_selector" onchange="chooseName()" disabled>
                        <option value="#(gas_file.stationid?? gas_file.gasstationid??)" selected>#(gas_file.filing_gas_station?? '未配置加气站')</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">制造与检验信息</div>
            <div class="form-grid">
                <div class="form-group"><label>制造单位</label><input type="text" name="gas_file.manufacture_unit" value="#(gas_file.manufacture_unit)"></div>
                <div class="form-group"><label>阀体编码</label><input type="text" name="gas_file.valve_body_code" value="#(gas_file.valve_body_code)"></div>
                <div class="form-group"><label>气瓶使用登记证编号</label><input type="text" name="gas_file.qpsydjzbh" value="#(gas_file.qpsydjzbh)"></div>
                <div class="form-group"><label>制造日期</label><input type="text" name="gas_file.manufacture_date" value="#(gas_file.manufacture_date)" placeholder="YYYY-MM-DD"></div>
                <div class="form-group"><label>检验日期</label><input type="text" name="gas_file.inspect_date" value="#(gas_file.inspect_date)" placeholder="YYYY-MM-DD"></div>
                <div class="form-group"><label>定检日期</label><input type="text" name="gas_file.regular_check_date" value="#(gas_file.regular_check_date)" placeholder="YYYY-MM-DD"></div>
                <div class="form-group"><label>终止使用日期</label><input type="text" name="gas_file.terminate_use_date" value="#(gas_file.terminate_use_date)" placeholder="YYYY-MM-DD"></div>
                <div class="form-group"><label>建档时间</label><input type="text" name="gas_file.jiandangshijian" value="#(gas_file.jiandangshijian)" placeholder="YYYY-MM-DD"></div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">规格参数</div>
            <div class="form-grid">
                <div class="form-group"><label>设备品种</label><input type="text" name="gas_file.monitoring_station" value="#(gas_file.monitoring_station)"></div>
                <div class="form-group"><label>充装规格</label><input type="text" name="gas_file.filling_specification" value="#(gas_file.filling_specification)"></div>
                <div class="form-group"><label>气瓶规格</label><input type="text" name="gas_file.gas_specification" value="#(gas_file.gas_specification)"></div>
                <div class="form-group"><label>充装介质</label><input type="text" name="gas_file.filling_medium" value="#(gas_file.filling_medium)"></div>
                <div class="form-group"><label>许可证号</label><input type="text" name="gas_file.xukezhenghao" value="#(gas_file.xukezhenghao)"></div>
                <div class="form-group"><label>公称压力</label><input type="text" name="gas_file.gongchengyali" value="#(gas_file.gongchengyali)"></div>
                <div class="form-group"><label>水试验压</label><input type="text" name="gas_file.shuishiyanya" value="#(gas_file.shuishiyanya)"></div>
                <div class="form-group"><label>容积</label><input type="text" name="gas_file.rongji" value="#(gas_file.rongji)"></div>
                <div class="form-group"><label>壁厚</label><input type="text" name="gas_file.bihou" value="#(gas_file.bihou)"></div>
                <div class="form-group"><label>气瓶自重</label><input type="text" name="gas_file.gas_suttle" value="#(gas_file.gas_suttle)"></div>
                <div class="form-group"><label>是否专用</label><input type="text" name="gas_file.shifouzhuanyong" value="#(gas_file.shifouzhuanyong)"></div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">使用者信息</div>
            <div class="form-grid">
                <div class="form-group"><label>使用者名称</label><input type="text" name="gas_file.shiyongzhemingcheng" value="#(gas_file.shiyongzhemingcheng)"></div>
                <div class="form-group"><label>使用者地址</label><input type="text" name="gas_file.shiyongzhedizhi" value="#(gas_file.shiyongzhedizhi)"></div>
                <div class="form-group"><label>电话</label><input type="text" name="gas_file.shiyongzhedianhua" value="#(gas_file.shiyongzhedianhua)"></div>
                <div class="form-group"><label>经度</label><input type="text" name="gas_file.shiyongzhejingdu" value="#(gas_file.shiyongzhejingdu)"></div>
                <div class="form-group"><label>纬度</label><input type="text" name="gas_file.shiyongzheweidu" value="#(gas_file.shiyongzheweidu)"></div>
            </div>
        </div>
    </form>
</div>

<script>
    var context = [];
    try {
        var jsonData = '#(com.alibaba.fastjson.JSONArray::toJSON(gasstations))';
        context = JSON.parse(jsonData.replace(/#/g, ''));
    } catch (error) {
        context = [];
    }

    function chooseName() {
        var selectValue = document.getElementById('selectName').value;
        var selectedStation = context.find(function (station) {
            return String(station.id) === String(selectValue);
        });

        if (selectedStation) {
            document.getElementById('gas_file.gasstationid').value = selectedStation.id;
            document.getElementById('gas_file.stationid').value = selectedStation.id;
            document.getElementById('gas_file.filing_gas_station').value = selectedStation.stationName || selectedStation.station_name;
        }

        checkGasNumberDuplicate();
    }

    function checkGasNumberDuplicate() {
        var tip = document.getElementById('gasNumberTip');
        var gasNumber = document.getElementById('gas_file.gas_number').value.trim();
        var stationId = document.getElementById('gas_file.stationid').value.trim();
        var currentId = document.getElementById('gasFileId').value.trim();
        var xhr;
        var requestUrl;

        if (!tip) {
            return;
        }

        if (!gasNumber) {
            tip.innerText = '气瓶编号不能为空！';
            tip.style.color = '#EF4444';
            return;
        }

        if (!stationId || stationId === '-1') {
            tip.innerText = '加气站信息异常，请刷新后重试';
            tip.style.color = '#EF4444';
            return;
        }

        xhr = window.XMLHttpRequest ? new XMLHttpRequest() : new ActiveXObject('Microsoft.XMLHTTP');
        requestUrl = '/gasFile/checkGasNumber?gasNumber=' + encodeURIComponent(gasNumber) + '&stationId=' + encodeURIComponent(stationId) + '&currentId=' + encodeURIComponent(currentId || '');

        xhr.open('GET', requestUrl, true);
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    if (xhr.responseText === 'duplicate') {
                        tip.innerText = '当前加气站下该气瓶编号已存在！';
                        tip.style.color = '#EF4444';
                    } else {
                        tip.innerText = '气瓶编号可用';
                        tip.style.color = '#10B981';
                    }
                } else {
                    tip.innerText = '验证失败，请重试';
                    tip.style.color = '#EF4444';
                }
            }
        };
        xhr.onerror = function () {
            tip.innerText = '网络异常，校验失败';
            tip.style.color = '#EF4444';
        };
        xhr.send();
    }
</script>
</body>
</html>
