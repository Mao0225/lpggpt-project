<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑IP地址</title>
    <style>
        body {
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
        }

        .form-container {
            background: #FFFFFF;
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
        }

        .required {
            color: #EF4444;
            margin-right: 4px;
        }

        .form-group input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            color: #1E293B;
            transition: all 0.15s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group input[readonly] {
            background: #F8FAFC;
            color: #64748B;
            cursor: not-allowed;
        }

        .help-text {
            font-size: 12px;
            color: #64748B;
            margin-top: 6px;
        }

        .error-msg {
            color: #DC2626;
            font-size: 13px;
            margin-bottom: 16px;
        }

        ::placeholder {
            color: #94A3B8;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="form-container">
    #if(errorMsg)
    <div class="error-msg">#(errorMsg)</div>
    #end

    <form action="/ipaddress/update" method="post" id="myForm">
        <input type="hidden" name="ipaddress.id" value="#(ipaddress.id)">

        <div class="form-group">
            <label><span class="required">*</span>设备编号</label>
            <input type="text" name="ipaddress.deviceno" value="#(ipaddress.deviceno)" required placeholder="请输入设备编号">
        </div>

        <div class="form-group">
            <label><span class="required">*</span>设备开关命令</label>
            <input type="text" name="ipaddress.poweronoff" value="#(ipaddress.poweronoff)" placeholder="10=正常，20=需要自动重启" required>
            <div class="help-text">提示：10=正常，20=需要自动重启</div>
        </div>

        <div class="form-group">
            <label><span class="required">*</span>IP地址</label>
            <input type="text" name="ipaddress.ipaddress" value="#(ipaddress.ipaddress)" required placeholder="请输入IP地址">
        </div>

        <div class="form-group">
            <label>标志</label>
            <input type="text" name="ipaddress.flag" value="#(ipaddress.flag)" placeholder="可选">
        </div>

        <div class="form-group">
            <label>状态</label>
            <input type="text" name="ipaddress.status" value="#(ipaddress.status)" placeholder="可选">
        </div>

        <div class="form-group">
            <label>预留1</label>
            <input type="text" name="ipaddress.yuliu1" value="#(ipaddress.yuliu1)" placeholder="可选">
        </div>

        <div class="form-group">
            <label>备注</label>
            <input type="text" name="ipaddress.memo" value="#(ipaddress.memo)" placeholder="可选">
        </div>

        <div class="form-group">
            <label>发生时间</label>
            <input type="text" name="ipaddress.happendtime" value="#(ipaddress.happendtime)" readonly>
            <div class="help-text">创建时的时间，不允许修改</div>
        </div>
    </form>
</div>

<script>
    document.getElementById('myForm').addEventListener('submit', function(e) {
        var deviceno = document.querySelector('input[name="ipaddress.deviceno"]').value;
        var poweronoff = document.querySelector('input[name="ipaddress.poweronoff"]').value;

        if (!deviceno.trim()) {
            alert('设备编号不能为空');
            e.preventDefault();
            return false;
        }

        if (['10', '20'].indexOf(poweronoff.trim()) === -1) {
            alert('设备开关命令只能是10或20');
            e.preventDefault();
            return false;
        }

        return true;
    });
</script>
</body>
</html>
