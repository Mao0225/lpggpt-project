<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑设备</title>
    <style>
        body {
            margin: 0;
            background: #F8FAFC;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        .form_box {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 24px;
        }

        #myForm {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .form-field.full-width {
            grid-column: 1 / -1;
        }

        .form-field label {
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
        }

        .form-field input[type="text"],
        .form-field textarea,
        .form-field select {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            background: #FFFFFF;
            color: #1E293B;
            transition: all 0.15s ease;
            box-sizing: border-box;
            font-family: inherit;
        }

        .form-field input[type="text"]:focus,
        .form-field textarea:focus,
        .form-field select:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-field textarea {
            min-height: 100px;
            resize: vertical;
        }

        .image-upload {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .image-upload-trigger {
            margin: 0;
            cursor: pointer;
        }

        .image-upload-trigger img {
            width: 100px;
            height: 100px;
            border: 1px dashed #CBD5E1;
            border-radius: 8px;
            object-fit: cover;
            background: #F8FAFC;
            display: block;
        }

        .image-item {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .image-item img {
            width: 100%;
            height: 100%;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            object-fit: cover;
            background: #FFFFFF;
        }

        .image-remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            border: 1px solid #CBD5E1;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            color: #64748B;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .image-remove-btn:hover {
            color: #DC2626;
            border-color: #FCA5A5;
            background: #FFFFFF;
        }

        @media (max-width: 768px) {
            .form_box {
                padding: 16px;
            }

            #myForm {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .form-field.full-width {
                grid-column: auto;
            }
        }
    </style>
</head>

<body>
<div class="form_box">
    <form id="myForm" action="/managerequip/update" method="post">
        <input type="hidden" name="equipment.id" value="#(equipment.id)" />

        <div class="form-field">
            <label>设备种类</label>
            <select name="equipment.kind">
                <option value="特种设备">特种设备</option>
                <option value="易损件">易损件</option>
                <option value="消防器材">消防器材</option>
            </select>
        </div>
        <div class="form-field">
            <label>生产厂商</label>
            <input type="text" name="equipment.factory" value="#(equipment.factory)" />
        </div>
        <div class="form-field">
            <label>型号规格</label>
            <input type="text" name="equipment.model" value="#(equipment.model)" />
        </div>
        <div class="form-field">
            <label>设备名称</label>
            <input type="text" name="equipment.name" value="#(equipment.name)" />
        </div>
        <div class="form-field">
            <label>放置位置</label>
            <input type="text" name="equipment.location" value="#(equipment.location)" />
        </div>
        <div class="form-field">
            <label>购买人员</label>
            <input type="text" name="equipment.buyer" value="#(equipment.buyer)" />
        </div>
        <div class="form-field">
            <label>购买价格</label>
            <input type="text" name="equipment.price" value="#(equipment.price)" />
        </div>
        <div class="form-field">
            <label>购买日期</label>
            <input type="text" name="equipment.buyday" value="#(equipment.buyday)" />
        </div>
        <div class="form-field">
            <label>生产日期</label>
            <input type="text" name="equipment.producedate" value="#(equipment.producedate)" />
        </div>
        <div class="form-field">
            <label>上次检修日期</label>
            <input type="text" name="equipment.lastcheckdate" value="#(equipment.lastcheckdate)" />
        </div>
        <div class="form-field">
            <label>失效日期</label>
            <input type="text" name="equipment.expiredate" value="#(equipment.expiredate)" />
        </div>
        <div class="form-field full-width">
            <label>备注信息</label>
            <textarea name="equipment.remark">#(equipment.remark)</textarea>
        </div>

        <div class="form-field full-width">
            <label>设备图片</label>
            <div id="equipmentImageUrlInputContainer" class="image-upload">
                <label for="equipmentImageInput" class="image-upload-trigger">
                    <img id="equipmentImageInputPreview" src="/upload/img_2.png" alt="点击添加图片" title="点击添加图片" />
                </label>
                <input type="file" id="equipmentImageInput" name="equipment_picture_file" onchange="uploadFile('equipmentImageInput')" accept="image/jpeg, image/png" style="display: none;" />
            </div>
            <input type="hidden" id="equipmentImageInputUrl" name="equipment.picture" value="#(equipment.picture)" />
        </div>
    </form>
</div>

<script>
    function appendImagePreview(inputElementId, imageUrl) {
        var container = document.getElementById(inputElementId + "Container");
        var urlInput = document.getElementById(inputElementId + "Url");
        var imageItem = document.createElement("div");
        imageItem.className = "image-item";

        var img = document.createElement("img");
        img.src = imageUrl;
        imageItem.appendChild(img);

        var removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "image-remove-btn";
        removeBtn.innerText = "x";
        removeBtn.onclick = function () {
            imageItem.parentNode.removeChild(imageItem);
            var urls = urlInput.value ? urlInput.value.split(",") : [];
            var idx = urls.indexOf(imageUrl);
            if (idx > -1) {
                urls.splice(idx, 1);
            }
            urlInput.value = urls.join(",");
        };
        imageItem.appendChild(removeBtn);

        container.appendChild(imageItem);
    }

    function uploadFile(inputElementId) {
        var fileInput = document.getElementById(inputElementId);
        var file = fileInput.files[0];
        if (!file) {
            return;
        }

        var formData = new FormData();
        formData.append("file", file);

        fetch("/managerequip/equipmentImageUpload", {
            method: "POST",
            body: formData
        })
            .then(function (response) {
                return response.json();
            })
            .then(function (data) {
                if (!data || !data.url) {
                    return;
                }
                var urlInput = document.getElementById(inputElementId + "Url");
                if (urlInput.value) {
                    urlInput.value += "," + data.url;
                } else {
                    urlInput.value = data.url;
                }
                appendImagePreview(inputElementId, data.url);
                fileInput.value = "";
            })
            .catch(function (error) {
                console.error("Upload failed:", error);
            });
    }

    $(document).ready(function () {
        var urlsRaw = document.getElementById("equipmentImageInputUrl").value || "";
        var urls = urlsRaw ? urlsRaw.split(",") : [];

        for (var i = 0; i < urls.length; i++) {
            if (urls[i]) {
                appendImagePreview("equipmentImageInput", urls[i]);
            }
        }
    });
</script>
</body>
</html>
